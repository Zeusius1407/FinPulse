# Render Blueprint — deploys the FinPulse API + a Postgres database.
# In Render: New > Blueprint > point at this repo. Free tier works.
#
# After the first deploy, populate data once from the service "Shell" tab:
#     python -m backend.ingest
# (or enable the built-in scheduler below to refresh automatically).

databases:
  - name: finpulse-db
    plan: free
    databaseName: finpulse
    user: finpulse

services:
  - type: web
    name: finpulse-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt psycopg2-binary
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finpulse-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.3"
      # Optional: let the API refresh data itself every 12h (keeps it fresh
      # without an external cron). Comment out if you prefer manual ingest.
      - key: FINPULSE_ENABLE_SCHEDULER
        value: "1"
      - key: FINPULSE_REFRESH_HOURS
        value: "12"
