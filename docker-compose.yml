# Full FinPulse stack: Postgres + API + Streamlit dashboard.
#
#   docker compose up --build            # start db + api + dashboard
#   docker compose run --rm ingest       # load LIVE yfinance data (run once)
#   docker compose run --rm -e SEED_ONLY=1 ingest   # load synthetic demo data
#   docker compose down                  # stop everything (data persists)
#   docker compose down -v               # stop and wipe the database volume
#
# After `up`, the API creates the tables automatically; run `ingest` once to
# populate them. Then open:
#   dashboard -> http://localhost:8501
#   API docs  -> http://localhost:8000/docs
#
# Inside the compose network services reach each other by name:
#   api -> db  at  db:5432
#   dashboard -> api  at  api:8000

x-app-image: &app-image
  build: .

services:
  db:
    image: postgres:16
    container_name: finpulse-db
    environment:
      POSTGRES_USER: finpulse
      POSTGRES_PASSWORD: finpulse
      POSTGRES_DB: finpulse
    ports:
      - "5432:5432"
    volumes:
      - finpulse_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finpulse -d finpulse"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    <<: *app-image
    container_name: finpulse-api
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql+psycopg2://finpulse:finpulse@db:5432/finpulse
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/').status==200 else 1)"]
      interval: 5s
      timeout: 5s
      retries: 10

  dashboard:
    <<: *app-image
    container_name: finpulse-dashboard
    command: >
      streamlit run dashboard/app.py
      --server.address 0.0.0.0 --server.port 8501
      --server.enableCORS false --server.enableXsrfProtection false
    environment:
      FINPULSE_API_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy

  # One-shot data loader. Not started by `up` (it has a profile); run on demand:
  #   docker compose run --rm ingest                 # live yfinance data
  #   docker compose run --rm -e SEED_ONLY=1 ingest  # synthetic demo data
  ingest:
    <<: *app-image
    profiles: ["tools"]
    command: bash scripts/populate_supabase.sh
    environment:
      DATABASE_URL: postgresql+psycopg2://finpulse:finpulse@db:5432/finpulse
    depends_on:
      db:
        condition: service_healthy

volumes:
  finpulse_pgdata:
